<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Tres sesenta consultoría, s.a. de c.v. - Más Información </title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
        }

        .contenedor-imagen {
            background-color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
            max-width: 100%;
            display: inline-block;
        }

        img {
            display: block;
            height: auto;
            max-width: 100%;
            border-radius: 8px;
            image-rendering: -webkit-optimize-contrast;
        }

        .espacio-texto {
            height: 3em;
            width: 100%;
        }

        /* === Botones flotantes WhatsApp + Gmail === */
        :root {
            --primary: #25D366;
            --gmail-bg: #ffffff;
        }

        .contact-fab {
            position: fixed;
            bottom: 24px;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 9999;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .contact-fab:hover {
            transform: scale(1.12);
            box-shadow: 0 12px 32px rgba(0,0,0,0.25);
        }

        .contact-fab:active {
            transform: scale(0.96);
        }

        .contact-icon {
            width: 38px;
            height: 38px;
            object-fit: contain;
        }

        /* WhatsApp */
        .whatsapp-fab {
            right: 24px;
            background: var(--primary);
        }

        /* Gmail */
        .gmail-fab {
            right: 100px;
            background: var(--gmail-bg);
            border: 1px solid #dadce0;
        }

        @media (max-width: 640px) {
            .whatsapp-fab { bottom: 16px; right: 16px; width: 56px; height: 56px; }
            .gmail-fab { bottom: 16px; right: 84px; width: 56px; height: 56px; }
            .contact-icon { width: 32px; height: 32px; }
        }
    </style>
</head>
<body>

    <div class="contenedor-imagen">
        <img src="1.png" alt="Imagen 1">
    </div>
    <div class="espacio-texto"></div>

    <div class="contenedor-imagen">
        <img src="2.png" alt="Imagen 2">
    </div>
    <div class="espacio-texto"></div>
    
    <div class="contenedor-imagen">
        <img src="3.png" alt="Imagen 3">
    </div>
    <div class="espacio-texto"></div>

    <div class="contenedor-imagen">
        <img src="4.png" alt="Imagen 4">
    </div>
    <div class="espacio-texto"></div>

    <div class="contenedor-imagen">
        <img src="5.png" alt="Imagen 5">
    </div>
    <div class="espacio-texto"></div>

    <div class="contenedor-imagen">
        <img src="6.png" alt="Imagen 6">
    </div>

    <a href="https://wa.me/528332932881?text=Hola,%20estoy%20interesado"
       class="contact-fab whatsapp-fab"
       target="_blank" rel="noopener noreferrer">
      <img src="WhatsApp.png" alt="WhatsApp" class="contact-icon">
    </a>

    <a href="#" id="gmail-btn"
       class="contact-fab gmail-fab"
       target="_blank" rel="noopener noreferrer">
      <img src="gmail.png" alt="Gmail" class="contact-icon">
    </a>

    <script>
        (function() {
            const gmailBtn = document.getElementById('gmail-btn');
            
            // Detección de dispositivo móvil
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            
            const email = "ventas.tressesentaconsultoria@gmail.com";
            const subject = encodeURIComponent("Interesado en tus servicios");
            const body = encodeURIComponent("Hola, estoy interesado");

            // URL para Computadora (Gmail Web)
            const desktopUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${email}&su=${subject}&body=${body}`;
            
            // URL para Celular (App de correo)
            const mobileUrl = `mailto:${email}?subject=${subject}&body=${body}`;

            // Asignar el enlace correcto según el dispositivo
            gmailBtn.href = isMobile ? mobileUrl : desktopUrl;
        })();
    </script>

</body>
</html>
