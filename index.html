<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Imágenes</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
        }

        .contenedor-imagen {
            background-color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
            max-width: 100%; /* Evita que la imagen se salga de la pantalla en móviles */
            display: inline-block; /* Se ajusta al ancho real de la imagen */
        }

        img {
            display: block;
            height: auto; /* Mantiene la proporción original */
            max-width: 100%; /* Evita que la imagen se pixele si es muy pequeña */
            border-radius: 8px;
            image-rendering: -webkit-optimize-contrast; /* Ayuda a que se vean más nítidas */
        }

        .espacio-texto {
            height: 3em; /* Espacio exacto de 3 líneas de texto */
            width: 100%;
        }
    </style>
</head>
<body>

<!-- === Botones flotantes WhatsApp + Gmail (copia y pega esto donde quieras) === -->

<style>
  :root {
    --primary: #25D366;       /* Verde WhatsApp */
    --gmail-bg: #ffffff;      /* Blanco Gmail */
  }

  /* Estilos compartidos para ambos botones */
  .contact-fab {
    position: fixed;
    bottom: 24px;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    cursor: pointer;
    z-index: 9999;
    transition: all 0.3s ease;
  }

  .contact-fab:hover {
    transform: scale(1.12);
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
  }

  .contact-fab:active {
    transform: scale(0.96);
  }

  .contact-icon {
    width: 38px;
    height: 38px;
    object-fit: contain;
  }

  /* Tooltip */
  .contact-fab::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 90px;
    background: #111;
    color: white;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 0.9rem;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    left: 50%;
    transform: translateX(-50%);
  }

  .contact-fab:hover::after {
    opacity: 1;
    bottom: 88px;
  }

  /* WhatsApp */
  .whatsapp-fab {
    right: 24px;
    background: var(--primary);
  }

  /* Gmail */
  .gmail-fab {
    right: 100px; /* a la izquierda del WhatsApp */
    background: var(--gmail-bg);
    border: 1px solid #dadce0;
  }

  @media (max-width: 640px) {
    .whatsapp-fab { bottom: 16px; right: 16px; width: 56px; height: 56px; }
    .gmail-fab { bottom: 16px; right: 84px; width: 56px; height: 56px; }
    .contact-icon { width: 32px; height: 32px; }
  }
</style>

<!-- Botón WhatsApp -->
<a href="https://wa.me/528332932881?text=Hola,%20estoy%20interesado"
   class="contact-fab whatsapp-fab"
   data-tooltip="WhatsApp"

</a>

   target="_blank" rel="noopener noreferrer">
  <img src="gmail.png" alt="Gmail" class="contact-icon">
</a>

</body>
